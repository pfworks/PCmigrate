  <!-- Caption under screenshot -->
  <text x="510" y="468" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle" font-style="italic">PCmigrate's dark-themed WPF interface shows live export progress.</text>
  <text x="510" y="482" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle" font-style="italic">The split Export button offers WSL-only and bundle modes.</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEFT COLUMN TEXT (col 1: x=50, width ~300) -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Intro paragraph - centered, full width -->
  <text x="510" y="510" font-family="Times New Roman, serif" font-size="12.5" fill="#000" text-anchor="middle">
    <tspan x="510" dy="0" font-weight="bold" font-size="13">M</tspan><tspan>oving to a new Windows PC has always been an exercise in tedium. You spend the first weekend reinstalling</tspan>
    <tspan x="510" dy="16">applications, hunting for license keys scrawled on Post-it notes, and praying your WSL environment survives the</tspan>
    <tspan x="510" dy="16">journey. PCmigrate, a free open-source utility from developer PFWorks, compresses that weekend into fifteen minutes.</tspan>
  </text>

  <!-- Column 1 body -->
  <text x="40" y="580" font-family="Times New Roman, serif" font-size="12" fill="#000">
    <tspan x="40" dy="0" font-weight="bold" font-family="Helvetica, Arial, sans-serif" font-size="11">SETUP AND INTERFACE</tspan>
    <tspan x="40" dy="18">You can grab PCmigrate as a traditional installer or portable zip from</tspan>
    <tspan x="40" dy="15">GitHub Releases. The installer weighs under 2 MB. On first launch it</tspan>
    <tspan x="40" dy="15">requests administrator privileges and presents a dark-themed WPF</tspan>
    <tspan x="40" dy="15">window that feels surprisingly polished for a PowerShell application.</tspan>
    <tspan x="40" dy="15">The interface is minimal: a path selector, an Export button with a</tspan>
    <tspan x="40" dy="15">dropdown for mode selection, and a Restore button. No wizard, no</tspan>
    <tspan x="40" dy="15">account creation, no telemetry. We appreciated the restraint.</tspan>
    <tspan x="40" dy="22" font-weight="bold" font-family="Helvetica, Arial, sans-serif" font-size="11">EXPORT PROCESS</tspan>
    <tspan x="40" dy="18">We tested on a Dell Precision workstation running Windows 11 23H2</tspan>
    <tspan x="40" dy="15">with 47 Win32 apps, 12 Store apps, two WSL distributions (Ubuntu</tspan>
    <tspan x="40" dy="15">22.04 on WSL 2 and Alpine on WSL 1), and license keys in the registry.</tspan>
    <tspan x="40" dy="18">Clicking Export Only with the output aimed at a Samsung T7 SSD took</tspan>
    <tspan x="40" dy="15">4 minutes 38 seconds. The tool produced a CSV inventory, interactive</tspan>
    <tspan x="40" dy="15">HTML checklist with download links, winget JSON export, full Ubuntu</tspan>
    <tspan x="40" dy="15">VHDX and Alpine tar, .wslconfig, zipped AppData folders, and a</tspan>
    <tspan x="40" dy="15">generated restore script.</tspan>
    <tspan x="40" dy="18">The HTML checklist deserves special mention. It renders a dark-themed</tspan>
    <tspan x="40" dy="15">page with checkboxes. Check off an app and the row grays out. License</tspan>
    <tspan x="40" dy="15">keys hide behind a click-to-reveal toggle with a per-key copy button.</tspan>
    <tspan x="40" dy="15">Small touch, real time saved.</tspan>
  </text>

  <!-- ═══════════════════════════════════════════════════════ -->
