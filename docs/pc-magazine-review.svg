      <tspan x="10" dy="16" font-weight="bold">Company:</tspan><tspan> PFWorks</tspan>
      <tspan x="10" dy="16" font-weight="bold">Price:</tspan><tspan> Free (MIT License)</tspan>
      <tspan x="10" dy="16" font-weight="bold">Requires:</tspan><tspan> Windows 10 v1709+ or 11, PowerShell 5.1+,</tspan>
      <tspan x="10" dy="14">Administrator privileges, winget</tspan>
