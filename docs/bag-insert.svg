<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 720" width="550" height="720">
  <!-- 70s plastic bag insert - cream/tan paper with brown/orange ink -->
  <defs>
    <filter id="paper" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply"/>
    </filter>
  </defs>

  <!-- Paper background - aged cream -->
  <rect width="550" height="720" fill="#f4e8c1"/>
  <!-- Subtle aging/stain -->
  <rect width="550" height="720" fill="#e8d5a0" opacity="0.15"/>
  <ellipse cx="400" cy="200" rx="120" ry="100" fill="#d4b87a" opacity="0.08"/>
  <ellipse cx="100" cy="600" rx="80" ry="60" fill="#d4b87a" opacity="0.06"/>

  <!-- Border - single rule, hand-drawn feel -->
  <rect x="20" y="20" width="510" height="680" fill="none" stroke="#5c3d1e" stroke-width="2.5"/>
  <rect x="25" y="25" width="500" height="670" fill="none" stroke="#5c3d1e" stroke-width="0.5"/>

  <!-- Company/publisher mark at top -->
  <text x="275" y="58" text-anchor="middle" font-family="Courier, monospace" font-size="11" fill="#8b4513" letter-spacing="4">PFWORKS SOFTWARE • 2026</text>

  <!-- Horizontal rule -->
  <line x1="45" y1="70" x2="505" y2="70" stroke="#5c3d1e" stroke-width="1"/>

  <!-- Main title - big chunky 70s serif -->
  <text x="275" y="125" text-anchor="middle" font-family="'Times New Roman', Times, serif" font-size="58" font-weight="bold" fill="#5c3d1e">PCmigrate</text>

  <!-- Subtitle -->
  <text x="275" y="160" text-anchor="middle" font-family="'Times New Roman', Times, serif" font-size="18" fill="#8b4513" font-style="italic">A Complete System Transfer Utility</text>
  <text x="275" y="182" text-anchor="middle" font-family="'Times New Roman', Times, serif" font-size="14" fill="#8b4513">for the Microsoft Windows™ Operating System</text>

  <!-- Decorative line -->
  <line x1="120" y1="200" x2="430" y2="200" stroke="#cc6600" stroke-width="1.5"/>
  <circle cx="120" cy="200" r="3" fill="#cc6600"/>
  <circle cx="275" cy="200" r="3" fill="#cc6600"/>
  <circle cx="430" cy="200" r="3" fill="#cc6600"/>

  <!-- Computer illustration - 70s line art style -->
  <g transform="translate(150, 220)" stroke="#5c3d1e" fill="none" stroke-width="1.5">
    <!-- Terminal/monitor -->
    <rect x="50" y="5" width="150" height="110" rx="8"/>
    <!-- Screen bezel -->
    <rect x="60" y="15" width="130" height="85" rx="3"/>
    <!-- Screen content - simple lines suggesting text -->
    <line x1="70" y1="32" x2="160" y2="32" stroke-width="1" opacity="0.6"/>
    <line x1="70" y1="42" x2="145" y2="42" stroke-width="1" opacity="0.6"/>
    <line x1="70" y1="52" x2="170" y2="52" stroke-width="1" opacity="0.6"/>
    <line x1="70" y1="62" x2="130" y2="62" stroke-width="1" opacity="0.6"/>
    <line x1="70" y1="72" x2="155" y2="72" stroke-width="1" opacity="0.6"/>
    <line x1="70" y1="82" x2="140" y2="82" stroke-width="1" opacity="0.6"/>
    <!-- Power light -->
    <circle cx="185" cy="105" r="3" fill="#cc6600"/>
    <!-- Stand -->
    <rect x="95" y="115" width="60" height="10" rx="2"/>
    <rect x="80" y="125" width="90" height="6" rx="3"/>
    <!-- Arrow showing transfer -->
    <line x1="210" y1="60" x2="240" y2="60" stroke="#cc6600" stroke-width="2"/>
    <polygon points="240,53 255,60 240,67" fill="#cc6600" stroke="none"/>
    <!-- Second terminal (destination) -->
    <rect x="260" y="25" width="100" height="75" rx="6"/>
    <rect x="268" y="33" width="84" height="55" rx="2"/>
    <!-- Stand -->
    <rect x="285" y="100" width="50" height="8" rx="2"/>
    <rect x="275" y="108" width="70" height="5" rx="2"/>
  </g>

  <!-- Caption under illustration -->
  <text x="275" y="380" text-anchor="middle" font-family="'Times New Roman', Times, serif" font-size="12" fill="#8b4513" font-style="italic">Fig. 1 — System-to-system migration via external media</text>

  <!-- Feature list - typeset like a 70s manual -->
  <line x1="45" y1="400" x2="505" y2="400" stroke="#5c3d1e" stroke-width="0.5"/>

  <text x="55" y="425" font-family="'Times New Roman', Times, serif" font-size="15" font-weight="bold" fill="#5c3d1e">FEATURES:</text>

  <text x="55" y="452" font-family="'Times New Roman', Times, serif" font-size="13" fill="#5c3d1e">● Backs up &amp; restores WSL Linux distributions (.tar / .vhdx)</text>
  <text x="55" y="474" font-family="'Times New Roman', Times, serif" font-size="13" fill="#5c3d1e">● Complete software inventory with download sources</text>
  <text x="55" y="496" font-family="'Times New Roman', Times, serif" font-size="13" fill="#5c3d1e">● Automatic license key retrieval (Windows, Office, registry)</text>
  <text x="55" y="518" font-family="'Times New Roman', Times, serif" font-size="13" fill="#5c3d1e">● Application data backup (%APPDATA% / %LOCALAPPDATA%)</text>
  <text x="55" y="540" font-family="'Times New Roman', Times, serif" font-size="13" fill="#5c3d1e">● Winget package export for automated bulk reinstall</text>
  <text x="55" y="562" font-family="'Times New Roman', Times, serif" font-size="13" fill="#5c3d1e">● Self-contained restore script — just run on the new machine</text>

  <!-- Requirements box -->
  <line x1="45" y1="580" x2="505" y2="580" stroke="#5c3d1e" stroke-width="0.5"/>

  <text x="55" y="606" font-family="'Times New Roman', Times, serif" font-size="15" font-weight="bold" fill="#5c3d1e">REQUIREMENTS:</text>
  <text x="55" y="628" font-family="Courier, monospace" font-size="11" fill="#5c3d1e">Windows 10 (1709+) or Windows 11</text>
  <text x="55" y="644" font-family="Courier, monospace" font-size="11" fill="#5c3d1e">PowerShell 5.1 or later</text>
  <text x="55" y="660" font-family="Courier, monospace" font-size="11" fill="#5c3d1e">Administrator privileges required</text>
  <text x="55" y="676" font-family="Courier, monospace" font-size="11" fill="#5c3d1e">External drive or network share</text>

  <!-- Bottom - version/license -->
  <line x1="45" y1="690" x2="505" y2="690" stroke="#5c3d1e" stroke-width="1"/>
  <text x="55" y="708" font-family="Courier, monospace" font-size="9" fill="#8b4513">Version 0.4.0 — MIT License — github.com/pfworks/PCmigrate</text>
</svg>
