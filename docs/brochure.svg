<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1650 850" width="1650" height="850">
  <!-- Tri-fold brochure: 3 panels at 550x850 each -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#0d1b3e"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b3e"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#120029"/>
      <stop offset="100%" style="stop-color:#0d1b3e"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="25%" style="stop-color:#c0c0c0"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="75%" style="stop-color:#808080"/>
      <stop offset="100%" style="stop-color:#c0c0c0"/>
    </linearGradient>
    <linearGradient id="sunset" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6ec7"/>
      <stop offset="50%" style="stop-color:#ff8c00"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#ff6ec7"/>
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════════ -->
  <!-- PANEL 1 (Left) - COVER / INTRO            -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="0" y="0" width="550" height="850" fill="url(#bg1)"/>

  <!-- Grid floor -->
  <g opacity="0.5">
    <line x1="0" y1="650" x2="550" y2="650" stroke="#ff00ff" stroke-width="1"/>
    <line x1="0" y1="690" x2="550" y2="690" stroke="#ff00ff" stroke-width="1"/>
    <line x1="0" y1="735" x2="550" y2="735" stroke="#ff00ff" stroke-width="1"/>
    <line x1="0" y1="785" x2="550" y2="785" stroke="#ff00ff" stroke-width="1"/>
    <line x1="0" y1="840" x2="550" y2="840" stroke="#ff00ff" stroke-width="1"/>
    <line x1="275" y1="630" x2="0" y2="850" stroke="#ff00ff" stroke-width="1"/>
    <line x1="275" y1="630" x2="92" y2="850" stroke="#ff00ff" stroke-width="1"/>
    <line x1="275" y1="630" x2="183" y2="850" stroke="#ff00ff" stroke-width="1"/>
    <line x1="275" y1="630" x2="275" y2="850" stroke="#ff00ff" stroke-width="1"/>
    <line x1="275" y1="630" x2="367" y2="850" stroke="#ff00ff" stroke-width="1"/>
    <line x1="275" y1="630" x2="458" y2="850" stroke="#ff00ff" stroke-width="1"/>
    <line x1="275" y1="630" x2="550" y2="850" stroke="#ff00ff" stroke-width="1"/>
  </g>

  <!-- Sun -->
  <circle cx="275" cy="350" r="100" fill="url(#sunset)" opacity="0.85"/>
  <rect x="175" y="360" width="200" height="5" fill="#1a0533" opacity="0.7"/>
  <rect x="175" y="373" width="200" height="7" fill="#1a0533" opacity="0.7"/>
  <rect x="175" y="389" width="200" height="9" fill="#1a0533" opacity="0.7"/>
  <rect x="175" y="408" width="200" height="11" fill="#1a0533" opacity="0.7"/>
  <rect x="175" y="430" width="200" height="13" fill="#1a0533" opacity="0.7"/>

  <!-- Stars -->
  <circle cx="60" cy="50" r="2" fill="white"/>
  <circle cx="490" cy="80" r="1.5" fill="white"/>
  <circle cx="130" cy="120" r="1" fill="white"/>
  <circle cx="420" cy="40" r="2" fill="white"/>
  <circle cx="40" cy="180" r="1.5" fill="white"/>
  <circle cx="510" cy="160" r="1" fill="white"/>

  <!-- Title -->
  <text x="275" y="100" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="58" font-weight="900" fill="url(#chrome)" letter-spacing="2">PC</text>
  <text x="275" y="160" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="48" font-weight="900" fill="url(#chrome)" letter-spacing="4">MIGRATE</text>

  <!-- Tagline -->
  <text x="275" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#00ffff" letter-spacing="5">TOTAL SYSTEM TRANSFER</text>
  <line x1="60" y1="220" x2="490" y2="220" stroke="#ff00ff" stroke-width="2" opacity="0.7"/>

  <!-- Computer graphic -->
  <g transform="translate(175, 480)">
    <rect x="30" y="0" width="140" height="100" rx="5" fill="#333" stroke="#666" stroke-width="2"/>
    <rect x="40" y="10" width="120" height="75" fill="#001100"/>
    <text x="50" y="32" font-family="monospace" font-size="9" fill="#00ff00">C:\&gt; PCMIGRATE</text>
    <text x="50" y="46" font-family="monospace" font-size="9" fill="#00ff00">EXPORTING WSL...</text>
    <text x="50" y="60" font-family="monospace" font-size="9" fill="#00ff00">████████░░ 80%</text>
    <text x="50" y="74" font-family="monospace" font-size="9" fill="#00ff00">DONE.</text>
    <rect x="80" y="100" width="40" height="12" fill="#444"/>
    <rect x="60" y="112" width="80" height="7" rx="2" fill="#555"/>
  </g>

  <!-- Bottom badge -->
  <rect x="140" y="770" width="270" height="50" rx="6" fill="none" stroke="#ff6ec7" stroke-width="1.5"/>
  <text x="275" y="795" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ff6ec7" font-weight="bold">FOR WINDOWS 10 &amp; 11</text>
  <text x="275" y="812" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffd700">FREE &amp; OPEN SOURCE • MIT LICENSE</text>

  <!-- Panel border -->
  <rect x="6" y="6" width="538" height="838" fill="none" stroke="#ff00ff" stroke-width="1.5" opacity="0.4"/>
  <rect x="10" y="10" width="530" height="830" fill="none" stroke="#00ffff" stroke-width="0.75" opacity="0.25"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- PANEL 2 (Center) - FEATURES               -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="550" y="0" width="550" height="850" fill="url(#bg2)"/>

  <!-- Section header -->
  <text x="825" y="60" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" fill="url(#chrome)" letter-spacing="3">FEATURES</text>
  <line x1="620" y1="75" x2="1030" y2="75" stroke="#ff00ff" stroke-width="2" opacity="0.7"/>
  <line x1="620" y1="78" x2="1030" y2="78" stroke="#ff00ff" stroke-width="1" opacity="0.3"/>

  <!-- Feature 1: WSL -->
  <rect x="590" y="100" width="470" height="2" fill="url(#neonPink)" opacity="0.4"/>
  <text x="620" y="130" font-family="Arial, sans-serif" font-size="11" fill="#ff6ec7" font-weight="bold" letter-spacing="2">■ WSL BACKUP &amp; RESTORE</text>
  <text x="620" y="152" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">Full filesystem export of every Linux distro.</text>
  <text x="620" y="170" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">.tar for WSL 1, .vhdx for WSL 2 (faster!).</text>
  <text x="620" y="188" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">Backs up .wslconfig automatically.</text>
  <text x="620" y="206" font-family="Arial, sans-serif" font-size="11" fill="#00ffff" font-style="italic">Use as a standalone backup tool or for migration.</text>

  <!-- Feature 2: Software Inventory -->
  <rect x="590" y="230" width="470" height="2" fill="url(#neonPink)" opacity="0.4"/>
  <text x="620" y="260" font-family="Arial, sans-serif" font-size="11" fill="#ff6ec7" font-weight="bold" letter-spacing="2">■ COMPLETE SOFTWARE INVENTORY</text>
  <text x="620" y="282" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">Detects all Win32 + Microsoft Store apps.</text>
  <text x="620" y="300" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">Versions, publishers, download URLs included.</text>
  <text x="620" y="318" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">Interactive HTML checklist for reinstalling.</text>

  <!-- Feature 3: License Keys -->
  <rect x="590" y="345" width="470" height="2" fill="url(#neonPink)" opacity="0.4"/>
  <text x="620" y="375" font-family="Arial, sans-serif" font-size="11" fill="#ff6ec7" font-weight="bold" letter-spacing="2">■ LICENSE KEY RETRIEVAL</text>
  <text x="620" y="397" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">Windows product key from BIOS/UEFI.</text>
  <text x="620" y="415" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">Office activation &amp; registry-stored serials.</text>
  <text x="620" y="433" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">Adobe, Autodesk, VMware, and more.</text>

  <!-- Feature 4: Winget -->
  <rect x="590" y="460" width="470" height="2" fill="url(#neonPink)" opacity="0.4"/>
  <text x="620" y="490" font-family="Arial, sans-serif" font-size="11" fill="#ff6ec7" font-weight="bold" letter-spacing="2">■ AUTOMATED REINSTALL</text>
  <text x="620" y="512" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">Exports winget package list for bulk install.</text>
  <text x="620" y="530" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">One-click restore on the new machine.</text>
  <text x="620" y="548" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">App data backup &amp; restore included.</text>

  <!-- Feature 5: GUI -->
  <rect x="590" y="575" width="470" height="2" fill="url(#neonPink)" opacity="0.4"/>
  <text x="620" y="605" font-family="Arial, sans-serif" font-size="11" fill="#ff6ec7" font-weight="bold" letter-spacing="2">■ SLEEK DARK GUI</text>
  <text x="620" y="627" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">Modern WPF interface. No command line required.</text>
  <text x="620" y="645" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">Live progress, cancel anytime.</text>
  <text x="620" y="663" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">Split-button export: Full, Bundle, or WSL Only.</text>

  <!-- Bottom quote -->
  <rect x="590" y="710" width="470" height="2" fill="url(#neonPink)" opacity="0.4"/>
  <text x="825" y="755" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#ffd700" font-style="italic">"The last migration tool you'll ever need."</text>
  <text x="825" y="780" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">— Totally Real Magazine, 1987</text>

  <!-- Panel border -->
  <rect x="556" y="6" width="538" height="838" fill="none" stroke="#ff00ff" stroke-width="1.5" opacity="0.4"/>
  <rect x="560" y="10" width="530" height="830" fill="none" stroke="#00ffff" stroke-width="0.75" opacity="0.25"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- PANEL 3 (Right) - HOW TO USE / SPECS       -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="1100" y="0" width="550" height="850" fill="url(#bg3)"/>

  <!-- Section header -->
  <text x="1375" y="60" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" fill="url(#chrome)" letter-spacing="3">HOW IT WORKS</text>
  <line x1="1170" y1="75" x2="1580" y2="75" stroke="#ff00ff" stroke-width="2" opacity="0.7"/>
  <line x1="1170" y1="78" x2="1580" y2="78" stroke="#ff00ff" stroke-width="1" opacity="0.3"/>

  <!-- Step 1 -->
  <circle cx="1160" cy="120" r="18" fill="none" stroke="#00ffff" stroke-width="2"/>
  <text x="1160" y="126" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="18" fill="#00ffff">1</text>
  <text x="1190" y="118" font-family="Arial, sans-serif" font-size="13" fill="#ffd700" font-weight="bold">EXPORT (Old Machine)</text>
  <text x="1190" y="138" font-family="monospace" font-size="11" fill="#00ff00">.\Migrate-Machine.ps1 -OutputPath "E:\"</text>
  <text x="1190" y="158" font-family="Arial, sans-serif" font-size="11" fill="#aaa">Or just click EXPORT in the GUI.</text>

  <!-- Arrow -->
  <text x="1375" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#ff6ec7">▼</text>

  <!-- Step 2 -->
  <circle cx="1160" cy="220" r="18" fill="none" stroke="#00ffff" stroke-width="2"/>
  <text x="1160" y="226" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="18" fill="#00ffff">2</text>
  <text x="1190" y="218" font-family="Arial, sans-serif" font-size="13" fill="#ffd700" font-weight="bold">TRANSFER</text>
  <text x="1190" y="238" font-family="Arial, sans-serif" font-size="11" fill="#cdd6f4">Move the external drive to the new machine.</text>
  <text x="1190" y="258" font-family="Arial, sans-serif" font-size="11" fill="#cdd6f4">Or use network share. Or carrier pigeon.</text>

  <!-- Arrow -->
  <text x="1375" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#ff6ec7">▼</text>

  <!-- Step 3 -->
  <circle cx="1160" cy="320" r="18" fill="none" stroke="#00ffff" stroke-width="2"/>
  <text x="1160" y="326" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="18" fill="#00ffff">3</text>
  <text x="1190" y="318" font-family="Arial, sans-serif" font-size="13" fill="#ffd700" font-weight="bold">RESTORE (New Machine)</text>
  <text x="1190" y="338" font-family="monospace" font-size="11" fill="#00ff00">E:\PCmigrate\Restore-Machine.ps1</text>
  <text x="1190" y="358" font-family="Arial, sans-serif" font-size="11" fill="#aaa">Or click RESTORE in the GUI.</text>

  <!-- Arrow -->
  <text x="1375" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#ff6ec7">▼</text>

  <!-- Step 4 -->
  <circle cx="1160" cy="420" r="18" fill="none" stroke="#00ffff" stroke-width="2"/>
  <text x="1160" y="426" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="18" fill="#00ffff">4</text>
  <text x="1190" y="418" font-family="Arial, sans-serif" font-size="13" fill="#ffd700" font-weight="bold">ENJOY YOUR NEW MACHINE</text>
  <text x="1190" y="438" font-family="Arial, sans-serif" font-size="11" fill="#cdd6f4">WSL distros running. Apps reinstalled.</text>
  <text x="1190" y="458" font-family="Arial, sans-serif" font-size="11" fill="#cdd6f4">License keys at your fingertips.</text>

  <!-- Specs box -->
  <rect x="1140" y="500" width="420" height="200" rx="6" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.6"/>
  <text x="1375" y="530" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="16" fill="#00ffff" letter-spacing="3">SYSTEM REQUIREMENTS</text>
  <line x1="1170" y1="540" x2="1530" y2="540" stroke="#00ffff" stroke-width="0.5" opacity="0.4"/>
  <text x="1170" y="570" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">SOURCE:  Windows 10 (1709+) or Windows 11</text>
  <text x="1170" y="595" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">TARGET:  Windows 11</text>
  <text x="1170" y="620" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">ENGINE:  PowerShell 5.1+</text>
  <text x="1170" y="645" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">ACCESS:  Run as Administrator</text>
  <text x="1170" y="670" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">MEDIA:   External drive or network share</text>
  <text x="1170" y="695" font-family="Arial, sans-serif" font-size="12" fill="#cdd6f4">TOOLS:   winget (pre-installed on Win11)</text>

  <!-- Bottom info -->
  <rect x="1140" y="730" width="420" height="90" rx="6" fill="#0a0a15" stroke="#ff6ec7" stroke-width="1" opacity="0.8"/>
  <text x="1375" y="758" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ff6ec7" font-weight="bold" letter-spacing="2">GET IT NOW</text>
  <text x="1375" y="782" text-anchor="middle" font-family="monospace" font-size="12" fill="#00ff00">github.com/pfworks/PCmigrate</text>
  <text x="1375" y="808" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Installer • Portable Zip • Source Code</text>

  <!-- Panel border -->
  <rect x="1106" y="6" width="538" height="838" fill="none" stroke="#ff00ff" stroke-width="1.5" opacity="0.4"/>
  <rect x="1110" y="10" width="530" height="830" fill="none" stroke="#00ffff" stroke-width="0.75" opacity="0.25"/>

  <!-- Fold lines (dashed, subtle) -->
  <line x1="550" y1="0" x2="550" y2="850" stroke="#444" stroke-width="1" stroke-dasharray="8,4" opacity="0.5"/>
  <line x1="1100" y1="0" x2="1100" y2="850" stroke="#444" stroke-width="1" stroke-dasharray="8,4" opacity="0.5"/>
</svg>
