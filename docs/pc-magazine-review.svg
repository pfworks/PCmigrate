  <!-- Caption under screenshot -->
  <text x="260" y="460" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle" font-style="italic">PCmigrate's dark-themed WPF interface shows live export progress.</text>
  <text x="260" y="474" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle" font-style="italic">The split Export button offers WSL-only and bundle modes.</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEFT COLUMN TEXT (col 1: x=50, width ~300) -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Intro paragraph - spans both cols above the image area, below it goes 2-col -->
  <text x="50" y="510" font-family="Times New Roman, serif" font-size="12.5" fill="#000">
    <tspan x="50" dy="0" font-weight="bold" font-size="13">M</tspan><tspan>oving to a new Windows PC has always been an exercise in tedium.</tspan>
    <tspan x="50" dy="16">You spend the first weekend reinstalling applications, hunting for</tspan>
    <tspan x="50" dy="16">license keys scrawled on Post-it notes, and praying your WSL envi-</tspan>
    <tspan x="50" dy="16">ronment survives the journey. PCmigrate, a free open-source utility</tspan>
    <tspan x="50" dy="16">from developer PFWorks, compresses that weekend into fifteen minutes.</tspan>
  </text>

  <!-- Column 1 body -->
  <text x="50" y="610" font-family="Times New Roman, serif" font-size="12" fill="#000">
    <tspan x="50" dy="0" font-weight="bold" font-family="Helvetica, Arial, sans-serif" font-size="11">SETUP AND INTERFACE</tspan>
    <tspan x="50" dy="18">You can grab PCmigrate as a traditional</tspan>
    <tspan x="50" dy="15">installer or portable zip from GitHub Re-</tspan>
    <tspan x="50" dy="15">leases. The installer weighs under 2 MB.</tspan>
    <tspan x="50" dy="15">On first launch it requests administrator</tspan>
    <tspan x="50" dy="15">privileges and presents a dark-themed WPF</tspan>
    <tspan x="50" dy="15">window that feels surprisingly polished for</tspan>
    <tspan x="50" dy="15">a PowerShell application. The interface is</tspan>
    <tspan x="50" dy="15">minimal: a path selector, an Export button</tspan>
    <tspan x="50" dy="15">with a dropdown for mode selection, and a</tspan>
    <tspan x="50" dy="15">Restore button. No wizard, no account, no</tspan>
    <tspan x="50" dy="15">telemetry. We appreciated the restraint.</tspan>
    <tspan x="50" dy="22" font-weight="bold" font-family="Helvetica, Arial, sans-serif" font-size="11">EXPORT PROCESS</tspan>
    <tspan x="50" dy="18">We tested on a Dell Precision workstation</tspan>
    <tspan x="50" dy="15">running Windows 11 23H2 with 47 Win32</tspan>
    <tspan x="50" dy="15">apps, 12 Store apps, two WSL distributions</tspan>
    <tspan x="50" dy="15">(Ubuntu 22.04 on WSL 2 and Alpine on WSL</tspan>
    <tspan x="50" dy="15">1), and license keys in the registry.</tspan>
    <tspan x="50" dy="18">Clicking Export Only with the output aimed</tspan>
    <tspan x="50" dy="15">at a Samsung T7 SSD took 4 minutes 38</tspan>
    <tspan x="50" dy="15">seconds. The tool produced a CSV inventory,</tspan>
    <tspan x="50" dy="15">interactive HTML checklist with download</tspan>
    <tspan x="50" dy="15">links, winget JSON export, full Ubuntu</tspan>
    <tspan x="50" dy="15">VHDX and Alpine tar, .wslconfig, zipped</tspan>
    <tspan x="50" dy="15">AppData folders, and a restore script.</tspan>
    <tspan x="50" dy="18">The HTML checklist deserves special men-</tspan>
    <tspan x="50" dy="15">tion. It renders a dark-themed page with</tspan>
    <tspan x="50" dy="15">checkboxes. Check off an app and the row</tspan>
    <tspan x="50" dy="15">grays out. License keys hide behind a click-</tspan>
    <tspan x="50" dy="15">to-reveal toggle with a per-key copy button.</tspan>
  </text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- RIGHT COLUMN TEXT (col 2: x=530, width ~300) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <text x="530" y="510" font-family="Times New Roman, serif" font-size="12" fill="#000">
    <tspan x="530" dy="0" font-weight="bold" font-family="Helvetica, Arial, sans-serif" font-size="11">WSL BACKUP</tspan>
    <tspan x="530" dy="18">The WSL-Only mode skips software inven-</tspan>
    <tspan x="530" dy="15">tory and just exports your Linux distribu-</tspan>
    <tspan x="530" dy="15">tions. For developers who routinely break</tspan>
    <tspan x="530" dy="15">their WSL setup experimenting with kernel</tspan>
    <tspan x="530" dy="15">builds, this is a one-click safety net. We</tspan>
    <tspan x="530" dy="15">exported a 14 GB Ubuntu VHDX to USB 3.2</tspan>
    <tspan x="530" dy="15">in just over two minutes—limited entirely</tspan>
    <tspan x="530" dy="15">by sequential write speed. On restore the</tspan>
    <tspan x="530" dy="15">tool creates install directories, runs wsl</tspan>
    <tspan x="530" dy="15">--import with correct flags, and prints a</tspan>
    <tspan x="530" dy="15">reminder to set your default user.</tspan>
    <tspan x="530" dy="22" font-weight="bold" font-family="Helvetica, Arial, sans-serif" font-size="11">RESTORE</tspan>
    <tspan x="530" dy="18">We moved the Samsung T7 to a fresh Win-</tspan>
    <tspan x="530" dy="15">dows 11 machine. Winget imported 39 of 47</tspan>
    <tspan x="530" dy="15">packages (the remainder had changed IDs).</tspan>
    <tspan x="530" dy="15">Both WSL distributions came back intact,</tspan>
    <tspan x="530" dy="15">including shell history and SSH keys. The</tspan>
    <tspan x="530" dy="15">entire restore took 11 minutes on gigabit.</tspan>
    <tspan x="530" dy="22" font-weight="bold" font-family="Helvetica, Arial, sans-serif" font-size="11">ROUGH EDGES</tspan>
    <tspan x="530" dy="18">SmartScreen flags the unsigned installer.</tspan>
    <tspan x="530" dy="15">No scheduled backup option yet—you must</tspan>
    <tspan x="530" dy="15">remember to run exports manually. A Task</tspan>
    <tspan x="530" dy="15">Scheduler integration would round out the</tspan>
    <tspan x="530" dy="15">WSL backup story nicely.</tspan>
    <tspan x="530" dy="22" font-weight="bold" font-family="Helvetica, Arial, sans-serif" font-size="11">CONCLUSIONS</tspan>
    <tspan x="530" dy="18">PCmigrate fills the gap Microsoft left when</tspan>
    <tspan x="530" dy="15">it retired Windows Easy Transfer. It's free,</tspan>
    <tspan x="530" dy="15">fast, respects your privacy, and handles</tspan>
    <tspan x="530" dy="15">WSL—the one thing most migration tools</tspan>
    <tspan x="530" dy="15">ignore entirely. Whether you're moving to</tspan>
    <tspan x="530" dy="15">a new machine or want insurance before</tspan>
    <tspan x="530" dy="15">your next rm -rf mishap, PCmigrate earns</tspan>
    <tspan x="530" dy="15">our Editors' Choice.</tspan>
  </text>

