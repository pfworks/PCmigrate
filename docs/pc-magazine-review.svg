  <!-- Ad text -->
  <text x="310" y="1160" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">SMC EtherCard ELITE16T</text>
  <text x="310" y="1183" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#ffcc00">16-BIT ISA ETHERNET. NO COMPROMISES.</text>
  <text x="310" y="1206" font-family="Times New Roman, serif" font-size="11" fill="#cccccc">
    <tspan x="310" dy="0">Full 16-bit ISA bus mastering. 10Base-T and BNC connectors.</tspan>
    <tspan x="310" dy="14">Hardware-selectable IRQ (3, 5, 7, 9, 10, 11). 16KB on-board</tspan>
    <tspan x="310" dy="14">RAM buffer. NetWare, LAN Manager, and TCP/IP drivers included.</tspan>
  </text>

  <text x="310" y="1258" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">$195</text>
