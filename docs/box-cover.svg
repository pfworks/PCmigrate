<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <!-- Background gradient - 80s purple/blue -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="50%" style="stop-color:#0d1b3e"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="25%" style="stop-color:#c0c0c0"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="75%" style="stop-color:#808080"/>
      <stop offset="100%" style="stop-color:#c0c0c0"/>
    </linearGradient>
    <linearGradient id="sunset" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6ec7"/>
      <stop offset="50%" style="stop-color:#ff8c00"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="grid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:0.2"/>
    </linearGradient>
  </defs>

  <!-- Box background -->
  <rect width="600" height="800" fill="url(#bg)"/>

  <!-- Retro grid floor -->
  <g opacity="0.6">
    <!-- Horizontal lines -->
    <line x1="0" y1="580" x2="600" y2="580" stroke="#ff00ff" stroke-width="1"/>
    <line x1="0" y1="610" x2="600" y2="610" stroke="#ff00ff" stroke-width="1"/>
    <line x1="0" y1="645" x2="600" y2="645" stroke="#ff00ff" stroke-width="1"/>
    <line x1="0" y1="685" x2="600" y2="685" stroke="#ff00ff" stroke-width="1"/>
    <line x1="0" y1="730" x2="600" y2="730" stroke="#ff00ff" stroke-width="1"/>
    <line x1="0" y1="780" x2="600" y2="780" stroke="#ff00ff" stroke-width="1"/>
    <!-- Vertical perspective lines -->
    <line x1="300" y1="560" x2="0" y2="800" stroke="#ff00ff" stroke-width="1"/>
    <line x1="300" y1="560" x2="60" y2="800" stroke="#ff00ff" stroke-width="1"/>
    <line x1="300" y1="560" x2="120" y2="800" stroke="#ff00ff" stroke-width="1"/>
    <line x1="300" y1="560" x2="180" y2="800" stroke="#ff00ff" stroke-width="1"/>
    <line x1="300" y1="560" x2="240" y2="800" stroke="#ff00ff" stroke-width="1"/>
    <line x1="300" y1="560" x2="300" y2="800" stroke="#ff00ff" stroke-width="1"/>
    <line x1="300" y1="560" x2="360" y2="800" stroke="#ff00ff" stroke-width="1"/>
    <line x1="300" y1="560" x2="420" y2="800" stroke="#ff00ff" stroke-width="1"/>
    <line x1="300" y1="560" x2="480" y2="800" stroke="#ff00ff" stroke-width="1"/>
    <line x1="300" y1="560" x2="540" y2="800" stroke="#ff00ff" stroke-width="1"/>
    <line x1="300" y1="560" x2="600" y2="800" stroke="#ff00ff" stroke-width="1"/>
  </g>

  <!-- Sun/circle -->
  <circle cx="300" cy="320" r="120" fill="url(#sunset)" opacity="0.9"/>
  <!-- Sun horizontal lines (retro style) -->
  <rect x="180" y="330" width="240" height="6" fill="#1a0533" opacity="0.7"/>
  <rect x="180" y="345" width="240" height="8" fill="#1a0533" opacity="0.7"/>
  <rect x="180" y="362" width="240" height="10" fill="#1a0533" opacity="0.7"/>
  <rect x="180" y="382" width="240" height="12" fill="#1a0533" opacity="0.7"/>
  <rect x="180" y="405" width="240" height="14" fill="#1a0533" opacity="0.7"/>

  <!-- Stars -->
  <circle cx="80" cy="60" r="2" fill="white"/>
  <circle cx="520" cy="90" r="1.5" fill="white"/>
  <circle cx="150" cy="120" r="1" fill="white"/>
  <circle cx="450" cy="50" r="2" fill="white"/>
  <circle cx="50" cy="200" r="1.5" fill="white"/>
  <circle cx="550" cy="180" r="1" fill="white"/>
  <circle cx="100" cy="300" r="1.5" fill="white"/>
  <circle cx="500" cy="280" r="2" fill="white"/>
  <circle cx="40" cy="400" r="1" fill="white"/>
  <circle cx="560" cy="350" r="1.5" fill="white"/>

  <!-- Computer/monitor graphic -->
  <g transform="translate(200, 420)">
    <!-- Monitor body -->
    <rect x="30" y="0" width="140" height="100" rx="5" fill="#333" stroke="#666" stroke-width="2"/>
    <!-- Screen -->
    <rect x="40" y="10" width="120" height="75" fill="#001100"/>
    <!-- Green text on screen -->
    <text x="50" y="35" font-family="monospace" font-size="10" fill="#00ff00">C:\&gt; MIGRATE</text>
    <text x="50" y="50" font-family="monospace" font-size="10" fill="#00ff00">COPYING...</text>
    <text x="50" y="65" font-family="monospace" font-size="10" fill="#00ff00">████████░░ 80%</text>
    <!-- Monitor stand -->
    <rect x="80" y="100" width="40" height="15" fill="#444"/>
    <rect x="60" y="115" width="80" height="8" rx="2" fill="#555"/>
  </g>

  <!-- Title - Chrome/metallic 80s style -->
  <text x="300" y="100" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="62" font-weight="900" fill="url(#chrome)" letter-spacing="2">PC</text>
  <text x="300" y="165" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="52" font-weight="900" fill="url(#chrome)" letter-spacing="4">MIGRATE</text>

  <!-- Subtitle with glow -->
  <text x="300" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#00ffff" letter-spacing="6">TOTAL SYSTEM TRANSFER UTILITY</text>

  <!-- Neon line separators -->
  <line x1="80" y1="225" x2="520" y2="225" stroke="#ff00ff" stroke-width="2" opacity="0.8"/>
  <line x1="80" y1="228" x2="520" y2="228" stroke="#ff00ff" stroke-width="1" opacity="0.4"/>

  <!-- Feature bullets - 80s marketing style -->
  <text x="300" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#00ffff" font-weight="bold">★ EXPORTS WSL DISTRIBUTIONS ★ RETRIEVES LICENSE KEYS ★</text>
  <text x="300" y="612" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#00ffff" font-weight="bold">★ INVENTORIES ALL SOFTWARE ★ AUTOMATED RESTORE ★</text>

  <!-- Bottom info bar -->
  <rect x="0" y="740" width="600" height="60" fill="#111"/>
  <text x="20" y="765" font-family="Arial, sans-serif" font-size="12" fill="#aaa">Requires: Windows 10/11 • PowerShell 5.1+ • Administrator</text>
  <text x="20" y="785" font-family="Arial, sans-serif" font-size="11" fill="#666">© 2026 pfworks • MIT License • v0.1.6</text>

  <!-- "Floppy disk" count badge -->
  <g transform="translate(460, 745)">
    <rect x="0" y="0" width="120" height="40" rx="4" fill="none" stroke="#ff6ec7" stroke-width="1.5"/>
    <text x="60" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ff6ec7" font-weight="bold">REQUIRES</text>
    <text x="60" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffd700" font-weight="bold">1× 5¼" FLOPPY</text>
  </g>

  <!-- Border - double line 80s box style -->
  <rect x="8" y="8" width="584" height="784" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.5"/>
  <rect x="14" y="14" width="572" height="772" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.3"/>
</svg>
