name: Release Installer

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build installer with Inno Setup
        run: iscc.exe installer.iss

      - name: Package portable zip
        run: Compress-Archive -Path Migrate-Machine.ps1, PCmigrate-GUI.ps1, PCmigrate.cmd, PCmigrate.vbs, icon.ico, README.md -DestinationPath PCmigrate_Portable.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Output/PCmigrate_Setup.exe
            PCmigrate_Portable.zip
