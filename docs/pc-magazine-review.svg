  <!-- Caption under screenshot -->
  <text x="510" y="468" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle" font-style="italic">PCmigrate's dark-themed WPF interface shows live export progress.</text>
  <text x="510" y="482" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle" font-style="italic">The split Export button offers WSL-only and bundle modes.</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEFT COLUMN TEXT (col 1: x=50, width ~300) -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Intro paragraph - spans both cols above the image area, below it goes 2-col -->
  <text x="40" y="510" font-family="Times New Roman, serif" font-size="12.5" fill="#000">
    <tspan x="40" dy="0" font-weight="bold" font-size="13">M</tspan><tspan>oving to a new Windows PC has always been an exercise in tedium. You spend the first weekend reinstalling</tspan>
    <tspan x="40" dy="16">applications, hunting for license keys scrawled on Post-it notes, and praying your WSL environment survives the</tspan>
    <tspan x="40" dy="16">journey. PCmigrate, a free open-source utility from developer PFWorks, compresses that weekend into fifteen minutes.</tspan>
  </text>

  <!-- Column 1 body -->
  <text x="40" y="580" font-family="Times New Roman, serif" font-size="12" fill="#000">
    <tspan x="40" dy="0" font-weight="bold" font-family="Helvetica, Arial, sans-serif" font-size="11">SETUP AND INTERFACE</tspan>
    <tspan x="40" dy="18">You can grab PCmigrate as a traditional installer or portable</tspan>
    <tspan x="40" dy="15">zip from GitHub Releases. The installer weighs under 2 MB.</tspan>
    <tspan x="40" dy="15">On first launch it requests administrator privileges and presents</tspan>
    <tspan x="40" dy="15">a dark-themed WPF window that feels surprisingly polished for</tspan>
    <tspan x="40" dy="15">a PowerShell application. The interface is minimal: a path selec-</tspan>
    <tspan x="40" dy="15">tor, an Export button with dropdown for mode selection, and a</tspan>
    <tspan x="40" dy="15">Restore button. No wizard, no account, no telemetry. We</tspan>
    <tspan x="40" dy="15">appreciated the restraint.</tspan>
    <tspan x="40" dy="22" font-weight="bold" font-family="Helvetica, Arial, sans-serif" font-size="11">EXPORT PROCESS</tspan>
    <tspan x="40" dy="18">We tested on a Dell Precision workstation running Windows 11</tspan>
    <tspan x="40" dy="15">23H2 with 47 Win32 apps, 12 Store apps, two WSL distributions</tspan>
    <tspan x="40" dy="15">(Ubuntu 22.04 on WSL 2 and Alpine on WSL 1), and license</tspan>
    <tspan x="40" dy="15">keys in the registry.</tspan>
    <tspan x="40" dy="18">Clicking Export Only with the output aimed at a Samsung T7</tspan>
    <tspan x="40" dy="15">SSD took 4 minutes 38 seconds. The tool produced a CSV</tspan>
    <tspan x="40" dy="15">inventory, interactive HTML checklist with download links,</tspan>
    <tspan x="40" dy="15">winget JSON export, full Ubuntu VHDX and Alpine tar, .wsl-</tspan>
    <tspan x="40" dy="15">config, zipped AppData folders, and a restore script.</tspan>
    <tspan x="40" dy="18">The HTML checklist deserves special mention. It renders a dark-</tspan>
    <tspan x="40" dy="15">themed page with checkboxes. Check off an app and the row</tspan>
    <tspan x="40" dy="15">grays out. License keys hide behind a click-to-reveal toggle with</tspan>
    <tspan x="40" dy="15">a per-key copy button. Small touch, real time saved.</tspan>
  </text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- RIGHT COLUMN TEXT (col 2: x=530, width ~300) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <text x="525" y="580" font-family="Times New Roman, serif" font-size="12" fill="#000">
    <tspan x="525" dy="0" font-weight="bold" font-family="Helvetica, Arial, sans-serif" font-size="11">WSL BACKUP</tspan>
    <tspan x="525" dy="18">The WSL-Only mode skips software inventory and just exports</tspan>
    <tspan x="525" dy="15">your Linux distributions. For developers who routinely break</tspan>
    <tspan x="525" dy="15">their WSL setup experimenting with kernel builds, this is a one-</tspan>
    <tspan x="525" dy="15">click safety net. We exported a 14 GB Ubuntu VHDX to USB</tspan>
    <tspan x="525" dy="15">3.2 in just over two minutes—limited entirely by sequential</tspan>
    <tspan x="525" dy="15">write speed. On restore the tool creates install directories, runs</tspan>
    <tspan x="525" dy="15">wsl --import with correct flags, and prints a reminder to set</tspan>
    <tspan x="525" dy="15">your default user.</tspan>
    <tspan x="525" dy="22" font-weight="bold" font-family="Helvetica, Arial, sans-serif" font-size="11">RESTORE</tspan>
    <tspan x="525" dy="18">We moved the Samsung T7 to a fresh Windows 11 machine.</tspan>
    <tspan x="525" dy="15">Winget imported 39 of 47 packages (the remainder had changed</tspan>
    <tspan x="525" dy="15">IDs). Both WSL distributions came back intact, including shell</tspan>
    <tspan x="525" dy="15">history and SSH keys. The entire restore took 11 minutes on a</tspan>
    <tspan x="525" dy="15">gigabit connection.</tspan>
    <tspan x="525" dy="22" font-weight="bold" font-family="Helvetica, Arial, sans-serif" font-size="11">ROUGH EDGES</tspan>
    <tspan x="525" dy="18">SmartScreen flags the unsigned installer. No scheduled backup</tspan>
    <tspan x="525" dy="15">option yet—you must remember to run exports manually. A</tspan>
    <tspan x="525" dy="15">Task Scheduler integration would round out the WSL backup</tspan>
    <tspan x="525" dy="15">story nicely.</tspan>
    <tspan x="525" dy="22" font-weight="bold" font-family="Helvetica, Arial, sans-serif" font-size="11">CONCLUSIONS</tspan>
    <tspan x="525" dy="18">PCmigrate fills the gap Microsoft left when it retired Windows</tspan>
    <tspan x="525" dy="15">Easy Transfer. It's free, fast, respects your privacy, and handles</tspan>
    <tspan x="525" dy="15">WSL—the one thing most migration tools ignore entirely.</tspan>
    <tspan x="525" dy="15">Whether you're moving to a new machine or want insurance</tspan>
    <tspan x="525" dy="15">before your next rm -rf mishap, PCmigrate earns our Editors'</tspan>
    <tspan x="525" dy="15">Choice.</tspan>
  </text>

