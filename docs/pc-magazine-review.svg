  <text x="310" y="1183" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#ffcc00">THE KEYBOARD THAT TYPES BACK.</text>
  <text x="310" y="1206" font-family="Times New Roman, serif" font-size="11" fill="#cccccc">
