      <rect x="0" y="0" width="55" height="55" fill="#222" rx="3"/>
      <rect x="15" y="0" width="25" height="18" fill="#ccc"/>
      <rect x="19" y="3" width="17" height="12" fill="#666"/>
      <rect x="10" y="30" width="35" height="22" fill="#eee" rx="2"/>
    </g>
    <text x="85" y="32" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">PKZIP 2.04g</text>
    <text x="85" y="48" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#000">PKWARE, Inc. — Brown Deer, WI</text>
    <text x="85" y="68" font-family="Times New Roman, serif" font-size="10" fill="#333">The industry-standard compression utility. Shrink files up to</text>
    <text x="85" y="80" font-family="Times New Roman, serif" font-size="10" fill="#333">95%. Spanning. Self-extracting archives. Password protection.</text>
    <text x="85" y="92" font-family="Times New Roman, serif" font-size="10" fill="#333">New Deflate algorithm. DOS, OS/2, Windows. Only $47.</text>
    <text x="85" y="112" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#555" font-style="italic">Order: 1-414-354-8699 or CompuServe GO PKWARE</text>
    <text x="220" y="126" font-family="Times New Roman, serif" font-size="9" fill="#333" text-anchor="middle" font-style="italic">Circle number 72 on the reader service card.</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- RIGHT COLUMN TEXT (col 2: x=520, width ~460) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <text x="520" y="580" font-family="Times New Roman, serif" font-size="12" fill="#000">
    <tspan x="520" dy="0" font-weight="bold" font-family="Helvetica, Arial, sans-serif" font-size="11">WSL BACKUP</tspan>
    <tspan x="520" dy="18">The WSL-Only mode skips software inventory and just exports your</tspan>
    <tspan x="520" dy="15">Linux distributions. For developers who routinely break their WSL</tspan>
    <tspan x="520" dy="15">setup experimenting with kernel builds, this is a one-click safety net.</tspan>
    <tspan x="520" dy="15">We exported a 14 GB Ubuntu VHDX to USB 3.2 in just over two</tspan>
    <tspan x="520" dy="15">minutes—limited entirely by sequential write speed. On restore the</tspan>
    <tspan x="520" dy="15">tool creates install directories, runs wsl --import with correct flags,</tspan>
    <tspan x="520" dy="15">and prints a reminder to set your default user.</tspan>
    <tspan x="520" dy="22" font-weight="bold" font-family="Helvetica, Arial, sans-serif" font-size="11">RESTORE</tspan>
    <tspan x="520" dy="18">We moved the Samsung T7 to a fresh Windows 11 machine. Winget</tspan>
    <tspan x="520" dy="15">imported 39 of 47 packages (the remainder had changed IDs or were</tspan>
    <tspan x="520" dy="15">unavailable). Both WSL distributions came back intact, including shell</tspan>
    <tspan x="520" dy="15">history and SSH keys. The entire restore took 11 minutes on gigabit.</tspan>
    <tspan x="520" dy="22" font-weight="bold" font-family="Helvetica, Arial, sans-serif" font-size="11">ROUGH EDGES</tspan>
    <tspan x="520" dy="18">SmartScreen flags the unsigned installer, which will alarm non-</tspan>
    <tspan x="520" dy="15">technical users. No scheduled backup option yet—you must remember</tspan>
    <tspan x="520" dy="15">to run exports manually. A Task Scheduler integration would round</tspan>
    <tspan x="520" dy="15">out the WSL backup story nicely.</tspan>
    <tspan x="520" dy="22" font-weight="bold" font-family="Helvetica, Arial, sans-serif" font-size="11">CONCLUSIONS</tspan>
    <tspan x="520" dy="18">PCmigrate fills the gap Microsoft left when it retired Windows Easy</tspan>
    <tspan x="520" dy="15">Transfer. It's free, fast, respects your privacy, and handles WSL—</tspan>
    <tspan x="520" dy="15">the one thing most migration tools ignore entirely. Whether you're</tspan>
    <tspan x="520" dy="15">moving to a new machine or want insurance before your next rm -rf</tspan>
    <tspan x="520" dy="15">mishap, PCmigrate earns our Editors' Choice.</tspan>
  </text>

